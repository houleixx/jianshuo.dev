<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>404 · jianshuo.dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#fbf3e9; --ink:#4a3f35; --sub:#8a7d6e; --accent:#ef7d54; }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;
    background:radial-gradient(ellipse 120% 80% at 50% -10%,#fdf0e0,var(--bg));
    color:var(--ink);font-family:'Nunito',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;padding:24px}
  .wrap{max-width:30em}
  .blob{width:54px;height:54px;margin:0 auto 22px;border-radius:42% 58% 60% 40%/45% 45% 55% 55%;
    background:linear-gradient(135deg,#f6a560,#ef7d54);box-shadow:0 8px 22px rgba(239,125,84,.4)}
  h1{font-family:'Quicksand',sans-serif;font-weight:700;font-size:4.5rem;margin:0;letter-spacing:-.02em;color:var(--accent)}
  h2{font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.4rem;margin:6px 0 0}
  p{font-size:1rem;line-height:1.7;color:var(--sub);margin:14px 0 0}
  a.home{display:inline-block;margin-top:26px;font-weight:700;font-size:.95rem;color:#fff;
    background:var(--accent);padding:12px 24px;border-radius:999px;text-decoration:none;
    box-shadow:0 8px 20px -6px rgba(239,125,84,.6)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="blob"></div>
    <h1>404</h1>
    <h2>这个页面不存在</h2>
    <p>你要找的页面可能被移动或删除了，也可能链接打错了。</p>
    <a class="home" href="/">回首页 →</a>
  </div>
</body>
</html>
