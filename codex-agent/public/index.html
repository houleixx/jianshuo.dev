<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Codex · jianshuo.dev</title>
<style>
  :root { --bg:#FAFAF7; --card:#fff; --ink:#26231C; --ink2:#6E675A; --line:#E8E3D7; --accent:#0891A2; --err:#C2410C; }
  * { box-sizing:border-box }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:15px/1.65 -apple-system,"PingFang SC",sans-serif; display:flex; flex-direction:column; height:100dvh }
  header { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--line); background:var(--card) }
  header h1 { font-size:15px; margin:0; flex:1 } header h1 small { color:var(--ink2); font-weight:400 }
  header button { border:1px solid var(--line); background:var(--card); border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer }
  #log { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px }
  .msg { max-width:72ch; padding:10px 14px; border-radius:12px; white-space:pre-wrap; word-break:break-word }
  .user { align-self:flex-end; background:var(--accent); color:#fff }
  .bot  { align-self:flex-start; background:var(--card); border:1px solid var(--line) }
  .card { align-self:flex-start; max-width:min(72ch,100%); width:fit-content; border:1px solid var(--line); border-radius:10px;
    background:var(--card); font:12.5px/1.5 ui-monospace,Menlo,monospace; overflow-x:auto }
  .card .hd { padding:6px 10px; color:var(--ink2); border-bottom:1px solid var(--line) }
  .card pre { margin:0; padding:8px 10px; white-space:pre-wrap; word-break:break-all; max-height:240px; overflow-y:auto }
  .thinking { color:var(--ink2); font-size:13px; font-style:italic }
  .status { align-self:center; color:var(--ink2); font-size:12.5px }
  .error { align-self:stretch; background:#FBEDE4; border-left:3px solid var(--err); color:#7C2D12; padding:8px 12px; border-radius:0 8px 8px 0; font-size:13.5px }
  form { display:flex; gap:8px; padding:12px 16px calc(12px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); background:var(--card) }
  textarea { flex:1; resize:none; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font:inherit; height:44px; max-height:140px }
  form button { border:0; background:var(--accent); color:#fff; border-radius:10px; padding:0 18px; font-size:14px; cursor:pointer }
  form button:disabled { opacity:.5 }
  textarea:focus-visible, button:focus-visible { outline:2px solid var(--accent); outline-offset:1px }
  /* 文件桥 */
  #files { border-bottom:1px solid var(--line); background:var(--card) }
  #files summary { list-style:none; cursor:pointer; padding:8px 16px; font-size:13px; color:var(--ink2); display:flex; align-items:center; gap:8px }
  #files summary::-webkit-details-marker { display:none }
  #files summary .up { margin-left:auto; border:1px solid var(--line); border-radius:8px; padding:3px 10px; font-size:12.5px; color:var(--ink) }
  #drop { padding:10px 16px 14px; display:flex; flex-direction:column; gap:6px }
  #drop.drag { background:var(--accent); background:color-mix(in srgb, var(--accent) 8%, transparent) }
  .frow { display:flex; align-items:center; gap:10px; font-size:13px; padding:4px 0 }
  .frow a { color:var(--accent); text-decoration:none; margin-left:auto; font-size:12.5px }
  .frow .sz { color:var(--ink2); font-size:12px; font-variant-numeric:tabular-nums }
  .fempty { color:var(--ink2); font-size:12.5px }
</style>
</head>
<body>
<header>
  <h1>Codex <small>· Tokyo VPS</small></h1>
  <button id="newchat" type="button">新会话</button>
</header>
<details id="files">
  <summary>📎 工作区文件 <span class="up" id="pick">上传</span></summary>
  <div id="drop">
    <div id="flist" class="fempty">还没有文件</div>
  </div>
  <input type="file" id="finput" multiple hidden>
</details>
<div id="log"></div>
<form id="f">
  <textarea id="t" placeholder="给 Codex 发消息…" required></textarea>
  <button id="send" type="submit">发送</button>
</form>
<script>
const log = document.getElementById("log"), form = document.getElementById("f"),
      ta = document.getElementById("t"), sendBtn = document.getElementById("send");
let chatId = null, statusEl = null;

const el = (tag, cls, text) => { const e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; };
const add = (e) => { log.appendChild(e); log.scrollTop = log.scrollHeight; return e; };
const setStatus = (t) => { if (!statusEl) statusEl = add(el("div","status")); statusEl.textContent = t; };
const clearStatus = () => { if (statusEl) { statusEl.remove(); statusEl = null; } };

document.getElementById("newchat").onclick = () => { chatId = null; log.innerHTML = ""; statusEl = null; ta.focus(); };

// --- 文件桥：上传 / 列表 / 下载 ---
const filesBox = document.getElementById("files"), flist = document.getElementById("flist"),
      finput = document.getElementById("finput"), drop = document.getElementById("drop");
const fmtSize = (n) => n < 1024 ? n + " B" : n < 1048576 ? (n/1024).toFixed(1) + " KB" : (n/1048576).toFixed(1) + " MB";

async function refreshFiles() {
  try {
    const list = await (await fetch("/api/files")).json();
    if (!list.length) { flist.className = "fempty"; flist.textContent = "还没有文件"; return; }
    flist.className = ""; flist.innerHTML = "";
    for (const f of list) {
      const row = el("div","frow");
      row.appendChild(el("span",null,f.name));
      row.appendChild(el("span","sz",fmtSize(f.size)));
      const a = el("a",null,"下载"); a.href = "/api/files/" + encodeURIComponent(f.name); a.download = f.name;
      row.appendChild(a);
      flist.appendChild(row);
    }
  } catch { /* 忽略 */ }
}

async function uploadFiles(fileList) {
  filesBox.open = true;
  for (const file of fileList) {
    const fd = new FormData(); fd.append("file", file);
    setStatus(`上传 ${file.name}…`);
    try {
      const res = await fetch("/api/upload", { method:"POST", body: fd });
      if (!res.ok) { clearStatus(); add(el("div","error", `上传 ${file.name} 失败：${await res.text()}`)); continue; }
      const { name } = await res.json();
      clearStatus();
      add(el("div","status", `已上传 ${name}，可以让 Codex 处理了`));
    } catch (err) { clearStatus(); add(el("div","error","上传失败：" + err.message)); }
  }
  refreshFiles();
}

document.getElementById("pick").onclick = (e) => { e.preventDefault(); finput.click(); };
finput.onchange = () => { if (finput.files.length) uploadFiles(finput.files); finput.value = ""; };
["dragover","dragenter"].forEach(ev => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("drag"); }));
["dragleave","drop"].forEach(ev => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove("drag"); }));
drop.addEventListener("drop", (e) => { if (e.dataTransfer?.files?.length) uploadFiles(e.dataTransfer.files); });
filesBox.addEventListener("toggle", () => { if (filesBox.open) refreshFiles(); });

const on = {
  chat: (d) => { chatId = d.chatId; },
  queued: () => setStatus("排队中…（前面还有一个任务）"),
  thinking: (d) => add(el("div","msg bot thinking", d.text)),
  text: (d) => add(el("div","msg bot", d.text)),
  cmd: (d) => { const c = el("div","card");
                c.appendChild(el("div","hd", `$ ${d.command}   → exit ${d.exitCode}`));
                c.appendChild(el("pre", null, d.output || ""));
                add(c); },
  files: (d) => { const c = el("div","card");
                  c.appendChild(el("div","hd","✎ " + (d.changes||[]).map(x=>`${x.kind??"edit"} ${x.path}`).join("  ")));
                  add(c); },
  result: () => {},
  session_reset: () => { chatId = null; add(el("div","status","（旧会话已过期，已自动开新会话）")); },
  error: (d) => add(el("div","error", d.message)),
};

form.onsubmit = async (e) => {
  e.preventDefault();
  const message = ta.value.trim();
  if (!message) return;
  ta.value = ""; sendBtn.disabled = true;
  add(el("div","msg user", message));
  setStatus("Codex 干活中…");
  try {
    const res = await fetch("/api/chat", { method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ chatId, message }) });
    const rd = res.body.getReader(); const dec = new TextDecoder(); let buf = "";
    for (;;) {
      const { done, value } = await rd.read();
      if (done) break;
      buf += dec.decode(value, { stream:true });
      let i;
      while ((i = buf.indexOf("\n\n")) >= 0) {
        const chunk = buf.slice(0, i); buf = buf.slice(i + 2);
        const ev = chunk.match(/^event: (.+)$/m)?.[1], data = chunk.match(/^data: (.+)$/m)?.[1];
        if (!ev || !data) continue;
        if (ev === "text" || ev === "error" || ev === "done") clearStatus();
        if (ev !== "done") on[ev]?.(JSON.parse(data));
        log.scrollTop = log.scrollHeight;
      }
    }
  } catch (err) {
    clearStatus(); add(el("div","error","连接断了：" + err.message));
  } finally {
    clearStatus(); sendBtn.disabled = false; ta.focus();
    if (filesBox.open) refreshFiles(); // agent 可能刚在工作区造了文件
  }
};
ta.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); } });
</script>
</body>
</html>
