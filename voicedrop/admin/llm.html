/* Standalone/preview fallback for the three helpers the pages use. The production
   server's /voicedrop/shared.js loads later and overrides these вҖ” safe either way. */
window.$=window.$||function(s,r){return (r||document).querySelector(s);};
window.esc=window.esc||function(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');};
window.resolveArticles=window.resolveArticles||function(doc){if(!doc)return[];var a=doc.articles||(doc.result&&doc.result.articles)||(doc.output&&doc.output.articles)||doc.results||[];if(!Array.isArray(a))return[];return a.map(function(x){return typeof x==='string'?{title:'',body:x}:{title:x.title||x.heading||'',body:x.body||x.content||x.text||''};});};

<script src="/voicedrop/shared.js"></script>
<script>
const API = '/files/api';
const TKEY = 'vd_admin_token';            // shared with index.html вҖ” token carries over
let TOKEN = localStorage.getItem(TKEY) || '';
let RECORDS = [];                          // current day's records, newest first
// $ / esc come from /voicedrop/shared.js (single source of truth).

function encKey(k){ return k.split('/').map(encodeURIComponent).join('/'); }
async function api(path){
  const r = await fetch(`${API}/${path}`, { headers:{ Authorization:`Bearer ${TOKEN}` }});
  if(!r.ok){ let m='';try{m=(await r.json()).error||'';}catch{} throw new Error(m||`HTTP ${r.status}`); }
  return r.json();
}

function fmtTime(ts){ const d=new Date(ts); const p=(n)=>String(n).padStart(2,'0');
  return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }
// REAL send time. Both sources now stamp `ts` at the moment the request is SENT
// (agent: before the API call; miner: tLlm before generateArticles), so order by
// ts вҖ” NEVER by the R2 key (key embeds ts + a random suffix вҶ’ equal-ms calls would
// scramble). Legacy miner logs written before this stamped ts at completion, so
// they're off by the call latency вҖ” a harmless few seconds for historical review.
function sentAt(r){ return (r && r.ts) || 0; }
function shortModel(m){ return String(m||'').replace(/^claude-/,'').replace(/-\d{8}$/,''); }
// жЁЎеһӢеӯ—жҜҚеӣҫж ҮпјҡжҢүе®¶ж—Ҹз»ҷдёҖдёӘеӯ—жҜҚ + й…ҚиүІпјҲSonnetвҶ’SгҖҒOpusвҶ’OгҖҒHaikuвҶ’HвҖҰпјүгҖӮ
function modelIcon(m){ const s=String(m||'').toLowerCase();
  if(s.includes('opus'))    return {l:'O',c:'opus'};
  if(s.includes('sonnet'))  return {l:'S',c:'sonnet'};
  if(s.includes('haiku'))   return {l:'H',c:'haiku'};
  if(s.includes('fable'))   return {l:'F',c:'fable'};
  if(s.includes('deepseek'))return {l:'D',c:'other'};
  if(s.includes('kimi')||s.includes('moonshot')) return {l:'K',c:'other'};
  if(s.includes('qwen'))    return {l:'Q',c:'other'};
  if(s.includes('gpt')||s.includes('openai')) return {l:'G',c:'other'};
  if(s.includes('gemini'))  return {l:'вңҰ',c:'other'};
  return {l:(s.replace(/.*\//,'')[0]||'?').toUpperCase(),c:'other'}; }
function modelIco(m){ const i=modelIcon(m); return `<span class="mico ${i.c}" title="${esc(m||'')}">${i.l}</span>`; }
function usageStr(u){ if(!u) return ''; const i=u.input_tokens??u.inputTokens, o=u.output_tokens??u.outputTokens;
  if(i==null&&o==null) return ''; return `${i??'?'}вҶ’${o??'?'} tok`; }

// ---- pricing: $ per 1M tokens [input, output]; cache-write +25%, cache-read вҲ’90% ----
const PRICING = {
  'fable-5':[10,50], 'mythos-5':[10,50],
  'opus-4-8':[5,25], 'opus-4-7':[5,25], 'opus-4-6':[5,25],
  'sonnet-4-6':[3,15], 'sonnet-4-5':[3,15],
  'haiku-4-5':[1,5],
};
function priceFor(model){ return PRICING[shortModel(model)] || null; }
function costOf(rec){
  const u = rec && rec.response && rec.response.usage; if(!u) return null;
  const p = priceFor(rec.model); if(!p) return null;
  const [pin,pout] = p;
  const inp=u.input_tokens||0, out=u.output_tokens||0,
        cc=u.cache_creation_input_tokens||0, cr=u.cache_read_input_tokens||0;
  return (inp*pin + cc*pin*1.25 + cr*pin*0.1 + out*pout) / 1e6;
}
function fmtUSD(c){
  if(c==null) return '';
  if(c===0) return '$0';
  if(c<0.01) return '$'+c.toFixed(4);
  if(c<1) return '$'+c.toFixed(3);
  return '$'+c.toFixed(2);
}

// ---- load one day: fetch all pages (ascending), then reverse вҶ’ newest first ----
async function loadDay(date){
  $('#list').innerHTML = `<div class="loading"><span class="spin"></span>еҠ иҪҪ ${date} вҖҰ</div>`;
  let objects=[], cursor=null;
  do{
    const q = `llmlog/list?date=${encodeURIComponent(date)}` + (cursor?`&cursor=${encodeURIComponent(cursor)}`:'');
    const r = await api(q);
    objects = objects.concat(r.objects||[]);
    cursor = r.cursor;
  } while(cursor);
  RECORDS = await fetchRecords(objects);
  // Order by REAL send time (ts вҲ’ latency), newest first вҖ” NOT by R2 key.
  RECORDS.sort((a,b)=> sentAt(b) - sentAt(a));
  renderList();
}

async function fetchRecords(objects){
  const out=[]; const CONC=8;
  for(let i=0;i<objects.length;i+=CONC){
    const batch = objects.slice(i,i+CONC).map(async (o)=>{
      try{ const rec = await api(`download/${encKey(o.key)}`); rec._key=o.key; return rec; }
      catch{ return { _key:o.key, _broken:true, ts:0 }; }
    });
    out.push(...await Promise.all(batch));
  }
  return out;
}

// ---- render the grouped list ----
function renderList(){
  const list = $('#list');
  if(!RECORDS.length){ list.innerHTML = `<div class="empty-state">иҝҷдёҖеӨ©жІЎжңүдәӨдә’</div>`; $('#count').textContent=''; return; }
  const dayCost = RECORDS.reduce((s,r)=> s + (costOf(r)||0), 0);
  $('#count').innerHTML = `${RECORDS.length} ж¬ЎдәӨдә’ В· <span class="tag cost">д»Ҡж—Ҙ ${esc(fmtUSD(dayCost))}</span>`;
  const groups = new Map();
  for(const r of RECORDS){ const k=r.turn_id||r._key; if(!groups.has(k)) groups.set(k,[]); groups.get(k).push(r); }
  // within a turn: real send order = step (tie-break by send time);
  // across turns: newest-first by when each turn STARTED (its first send).
  const ordered = [...groups.values()].map((g)=>{ g.sort((a,b)=>(a.step??0)-(b.step??0) || sentAt(a)-sentAt(b)); return g; })
    .sort((a,b)=> Math.min(...b.map(sentAt)) - Math.min(...a.map(sentAt)));
  let html='';
  for(const g of ordered){
    const llmSteps = g.filter((r)=>r.kind!=='tool_runs').length;  // рҹ”§ tool_runs rows aren't жӯҘ
    const multi = llmSteps>1;
    if(g.length>1){
      const turnCost = g.reduce((s,r)=> s + (costOf(r)||0), 0);
      html += `<div class="grp"><div class="grphd">turn В· ${llmSteps} жӯҘ В· ${esc(g[0].meta?.stem||'')}<span class="gcost">${esc(fmtUSD(turnCost))}</span></div>`;
    }
    else html += `<div class="grp">`;
    for(const r of g){
      const idx = RECORDS.indexOf(r);
      if(r.kind==='tool_runs'){
        const runs = r.tool_runs||[];
        const bad = runs.some((t)=>!t.ok);
        html += `<div class="row trow" data-i="${idx}">
          <span class="t" title="е·Ҙе…·жү§иЎҢж—¶еҲ»">${esc(fmtTime(sentAt(r)))}</span>
          <span class="badge tool">рҹ”§ е·Ҙе…·</span>
          <span class="grow name">${esc(runs.map((t)=>t.name).join(' В· ')||'(ж— )')}</span>
          <span class="badge ${bad?'err':'ok'}">${bad?'жңүй”ҷ':'ok'}</span>
        </div>`;
        continue;
      }
      const okCls = r._broken?'err':(r.ok?'ok':'err');
      const okTxt = r._broken?'жҚҹеқҸ':(r.ok?'ok':'err');
      html += `<div class="row" data-i="${idx}">
        <span class="t" title="еҸ‘йҖҒж—¶еҲ»">${esc(fmtTime(sentAt(r)))}</span>
        <span class="badge ${r.source==='mine'?'mine':'agent'}">${esc(r.source||'?')}</span>
        ${r.meta&&r.meta.restyle!=null?`<span class="badge restyle">вҶ» v${esc(r.meta.restyle)}</span>`:''}
        <span class="grow">${modelIco(r.model)}${esc(shortModel(r.model))}${multi&&r.step!=null?` В· #${r.step}`:''}</span>
        <span class="tok">${esc(usageStr(r.response&&r.response.usage))}</span>
        <span class="cost">${esc(fmtUSD(costOf(r)))}</span>
        <span class="badge ${okCls}">${okTxt}</span>
      </div>`;
    }
    html += `</div>`;
  }
  list.innerHTML = html;
  list.querySelectorAll('.row').forEach((el)=> el.addEventListener('click',()=>select(+el.dataset.i, el)));
}

function select(i, el){
  $('#list').querySelectorAll('.row.sel').forEach((e)=>e.classList.remove('sel'));
  if(el) el.classList.add('sel');
  renderDetail(RECORDS[i]);
}

// ---- render one record's full request + response ----
function blocksHtml(content){
  if(content==null) return '';
  if(typeof content==='string') return `<div class="tx">${esc(content)}</div>`;
  if(!Array.isArray(content)) return `<pre class="code">${esc(JSON.stringify(content,null,2))}</pre>`;
  return content.map((b)=>{
    if(b.type==='text') return `<div class="tx">${esc(b.text)}</div>`;
    if(b.type==='tool_use') return `<div class="blk"><div class="bt">tool_use В· ${esc(b.name)}</div><pre class="code">${esc(JSON.stringify(b.input,null,2))}</pre></div>`;
    if(b.type==='tool_result'){ const c=typeof b.content==='string'?b.content:JSON.stringify(b.content,null,2);
      return `<div class="blk"><div class="bt">tool_result</div><pre class="code">${esc(c)}</pre></div>`; }
    return `<pre class="code">${esc(JSON.stringify(b,null,2))}</pre>`;
  }).join('');
}

function msgsHtml(messages){
  if(!Array.isArray(messages)) return '';
  return messages.map((m)=>`<div class="msg ${m.role==='assistant'?'assistant':'user'}">
    <div class="role">${esc(m.role)}</div>${blocksHtml(m.content)}</div>`).join('');
}

// рҹ”§ a tool_runs record: the actual tools this instruction executed + their results.
function toolRunsDetail(r){
  const runs = r.tool_runs||[];
  let h = `<div class="meta">
    <span><b>рҹ”§ е·Ҙе…·жү§иЎҢ</b></span>
    ${r.meta&&r.meta.stem?`<span>${esc(r.meta.stem)}</span>`:''}
    <span>еҸ‘йҖҒ <b>${esc(new Date(sentAt(r)).toLocaleString('zh-CN'))}</b></span>
    ${r.turn_id?`<span class="usage">turn ${esc(r.turn_id)}</span>`:''}
  </div>`;
  if(r.meta&&r.meta.instruction){
    h += `<h3 class="sec">иҜӯйҹіжҢҮд»Ө</h3><div class="msg user"><div class="tx">${esc(r.meta.instruction)}</div></div>`;
  }
  h += `<h3 class="sec">е·Ҙе…·и°ғз”Ё В· ${runs.length}</h3>`;
  if(!runs.length) h += `<div class="empty-state">иҝҷж¬ЎжІЎжңүи°ғз”Ёе·Ҙе…·</div>`;
  for(const t of runs){
    h += `<div class="msg tres ${t.ok?'':'bad'}">
      <div class="role">${esc(t.name)} ${t.ok?'вң“':'вң—'}${t.step!=null?` В· з¬¬${t.step}жӯҘ`:''}</div>
      <div class="blk"><div class="bt">input</div><pre class="code">${esc(JSON.stringify(t.input,null,2))}</pre></div>
      <div class="blk"><div class="bt">result</div><pre class="code">${esc(JSON.stringify(t.result,null,2))}</pre></div>
    </div>`;
  }
  h += `<details class="fold"><summary>еҺҹе§Ӣ JSONпјҲж•ҙжқЎи®°еҪ•пјү</summary><pre class="code">${esc(JSON.stringify(r,null,2))}</pre></details>`;
  return h;
}

function renderDetail(r){
  const d = $('#detail');
  if(!r){ d.innerHTML=`<div class="empty-state">вҖ”</div>`; return; }
  if(r._broken){ d.innerHTML=`<div class="errbox">иҝҷжқЎж—Ҙеҝ—иҜ»еҸ–еӨұиҙҘпјҡ${esc(r._key)}</div>`; return; }
  if(r.kind==='tool_runs'){ d.innerHTML = toolRunsDetail(r); d.scrollTop=0; return; }
  const req=r.request||{}, resp=r.response;
  const cost=costOf(r);
  let h = `<div class="meta">
    <span><b>${esc(r.source||'?')}</b></span>
    ${r.meta&&r.meta.restyle!=null?`<span class="badge restyle">вҶ» restyle v${esc(r.meta.restyle)}</span>`:''}
    <span>${modelIco(r.model)}${esc(shortModel(r.model))}</span>
    <span>еҸ‘йҖҒ <b>${esc(new Date(sentAt(r)).toLocaleString('zh-CN'))}</b></span>
    <span>иҖ—ж—¶ <b>${r.latency_ms!=null?(r.latency_ms/1000).toFixed(1)+'s':'вҖ”'}</b></span>
    <span>HTTP <b>${esc(r.http_status)}</b> ${r.ok?'':'В· <b style="color:var(--err)">еӨұиҙҘ</b>'}</span>
    ${cost!=null?`<span>д»·ж ј <b style="color:var(--accent)">${esc(fmtUSD(cost))}</b></span>`:''}
    ${r.user_scope?`<span>${esc(r.user_scope)}</span>`:''}
    ${r.meta&&r.meta.stem?`<span>${esc(r.meta.stem)}</span>`:''}
    ${r.turn_id?`<span class="usage">turn ${esc(r.turn_id)}${r.step!=null?` #${r.step}`:''}</span>`:''}
  </div>`;

  if(r.meta&&r.meta.instruction){
    h += `<h3 class="sec">иҜӯйҹіжҢҮд»Ө</h3><div class="msg user"><div class="tx">${esc(r.meta.instruction)}</div></div>`;
  }

  h += `<h3 class="sec">еҸ‘еҮә В· request</h3>`;
  h += `<div class="usage">model=${esc(req.model)} В· max_tokens=${esc(req.max_tokens)}${req.tool_choice?` В· tool_choice=${esc(JSON.stringify(req.tool_choice))}`:''}</div>`;
  if(req.system){
    // system can be a plain string (agent) or Anthropic text-blocks (mine: cache_control breakpoints).
    const sysTxt = typeof req.system==='string' ? req.system
      : Array.isArray(req.system) ? req.system.map((b)=> typeof b==='string'?b:(b.text||JSON.stringify(b))).join('\n\n')
      : JSON.stringify(req.system,null,2);
    h += `<details class="fold"><summary>system promptпјҲ${sysTxt.length} еӯ—пјү</summary><pre class="code">${esc(sysTxt)}</pre></details>`;
  }
  h += msgsHtml(req.messages);
  if(req.tools&&req.tools.length) h += `<details class="fold"><summary>toolsпјҲ${req.tools.length}пјү</summary><pre class="code">${esc(JSON.stringify(req.tools,null,2))}</pre></details>`;
  if(req.output_config) h += `<details class="fold"><summary>output_configпјҲз»“жһ„еҢ–иҫ“еҮә schemaпјү</summary><pre class="code">${esc(JSON.stringify(req.output_config,null,2))}</pre></details>`;

  h += `<h3 class="sec">ж”¶еӣһ В· response</h3>`;
  if(r.error!=null || !r.ok){
    h += `<div class="errbox">${esc(r.error||'(ж— е“Қеә”дҪ“)')}</div>`;
  }
  if(resp){
    if(resp.stop_reason||resp.usage) h += `<div class="usage">stop_reason=${esc(resp.stop_reason||'вҖ”')}${resp.usage?` В· usage ${esc(JSON.stringify(resp.usage))}`:''}</div>`;
    h += `<div class="msg assistant"><div class="role">assistant</div>${blocksHtml(resp.content)}</div>`;
  }

  h += `<details class="fold"><summary>еҺҹе§Ӣ JSONпјҲж•ҙжқЎи®°еҪ•пјү</summary><pre class="code">${esc(JSON.stringify(r,null,2))}</pre></details>`;
  d.innerHTML = h;
  d.scrollTop = 0;
}

// ---- dates + boot ----
async function loadDates(){
  const { dates } = await api('llmlog/dates');
  const sel = $('#date');
  if(!dates || !dates.length){ sel.innerHTML=`<option>ж— ж•°жҚ®</option>`; $('#list').innerHTML=`<div class="empty-state">иҝҳжІЎжңүд»»дҪ• LLM дәӨдә’ж—Ҙеҝ—</div>`; return; }
  sel.innerHTML = dates.map((d)=>`<option value="${d}">${d}</option>`).join('');
  sel.value = dates[0];
  await loadDay(dates[0]);
}

function showGate(msg){ $('#app').hidden=true; $('#gate').hidden=false; $('#gateErr').textContent=msg||''; $('#tok').focus(); }
function logout(msg){ TOKEN=''; localStorage.removeItem(TKEY); showGate(msg); }
async function boot(){
  $('#gate').hidden=true; $('#app').hidden=false;
  try{ await loadDates(); }
  catch(e){ if(String(e.message).match(/unauthorized|admin only|HTTP 401|HTTP 403/)){ logout('token ж— ж•Ҳ'); } else { $('#list').innerHTML=`<div class="errbox">${esc(e.message)}</div>`; } }
}
function enter(){
  const v=$('#tok').value.trim();
  if(!v){ $('#gateErr').textContent='иҜ·иҫ“е…Ҙ token'; return; }
  TOKEN=v; localStorage.setItem(TKEY,v); boot();
}

$('#enter').addEventListener('click', enter);
$('#tok').addEventListener('keydown',(e)=>{ if(e.key==='Enter') enter(); });
$('#logout').addEventListener('click',()=>logout());
$('#refresh').addEventListener('click',()=>{ const d=$('#date').value; if(d&&d!=='ж— ж•°жҚ®') loadDay(d).catch((e)=>$('#list').innerHTML=`<div class="errbox">${esc(e.message)}</div>`); });
$('#date').addEventListener('change',(e)=>{ const d=e.target.value; if(d&&d!=='ж— ж•°жҚ®') loadDay(d).catch((er)=>$('#list').innerHTML=`<div class="errbox">${esc(er.message)}</div>`); });

if(TOKEN) boot(); else showGate();
</script>
