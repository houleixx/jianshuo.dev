<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>VoiceDrop 控制台</title>
<link rel="stylesheet" href="./theme.css"/>
<script>
/* Standalone/preview fallback for the three helpers the pages use. The production
   server's /voicedrop/shared.js loads later and overrides these — safe either way. */
window.$=window.$||function(s,r){return (r||document).querySelector(s);};
window.esc=window.esc||function(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');};
window.resolveArticles=window.resolveArticles||function(doc){if(!doc)return[];var a=doc.articles||(doc.result&&doc.result.articles)||(doc.output&&doc.output.articles)||doc.results||[];if(!Array.isArray(a))return[];return a.map(function(x){return typeof x==='string'?{title:'',body:x}:{title:x.title||x.heading||'',body:x.body||x.content||x.text||''};});};
</script>
<style>
.wrap{max-width:1040px;margin:0 auto;padding:26px 22px 90px}

/* ---- user list ---- */
.user{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);margin-bottom:12px;
  overflow:hidden;box-shadow:var(--shadow)}
.user>summary{list-style:none;cursor:pointer;padding:16px 18px;display:flex;align-items:center;gap:12px}
.user>summary::-webkit-details-marker{display:none}
.user>summary:hover{background:var(--bg-sunk)}
.user>summary .caret{color:var(--muted);font-size:.72rem;transition:transform .15s;flex:none}
.user[open]>summary .caret{transform:rotate(90deg)}
.user[open]>summary{border-bottom:1px solid var(--line2)}
.uava{width:34px;height:34px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;
  background:var(--accent-bg);color:var(--accent-deep);font-weight:800;font-size:.86rem}
.user .uname{font-weight:700;font-size:1rem}
.user .usub{font-size:.73rem;color:var(--muted);font-family:var(--fm)}
.user .ustat{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.ubody{padding:4px 18px 14px}
.style{font-size:.84rem;color:var(--ink-2);background:var(--bg-sunk);border:1px solid var(--line2);
  border-radius:var(--r-sm);padding:11px 13px;margin:12px 0 4px;white-space:pre-wrap;
  max-height:140px;overflow-y:auto;line-height:1.7}
.style b{color:var(--accent-deep);display:block;margin-bottom:4px;font-size:.78rem;letter-spacing:.02em}

/* ---- recording rows ---- */
.rec{border-top:1px solid var(--line2);padding:14px 2px}
.rec:first-child{border-top:none}
.rec .rhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rec .rtitle{font-weight:600;color:var(--ink)}
.rec .rmeta{font-size:.78rem;color:var(--muted)}
.rec .rmeta .dot{margin:0 5px;opacity:.45}
.rec audio{height:36px;margin-top:10px;width:100%;max-width:460px;display:block}
.rec .acts{margin-top:9px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.detail{margin-top:11px;background:var(--bg-sunk);border:1px solid var(--line2);border-radius:var(--r-sm);padding:0 14px;
  display:none}
.detail.open{display:block;padding:14px 16px}
.detail h4{margin:15px 0 6px;font-size:.74rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.detail h4:first-child{margin-top:2px}
.detail .art{margin:0 0 12px}
.detail .art .at{font-weight:700;font-size:1.04rem;margin:0 0 6px;color:var(--ink)}
.detail .art .ab{white-space:pre-wrap;font-size:.92rem;line-height:1.75;color:var(--ink-2)}
.detail .tx{white-space:pre-wrap;font-size:.86rem;color:var(--ink-2);line-height:1.65;
  background:#fff;border:1px solid var(--line2);border-radius:9px;padding:11px 13px}
.detail .reason{color:var(--warn);font-size:.9rem}
.detail .kv{font-size:.78rem;color:var(--muted);font-family:var(--fm)}
.detail hr{border:none;border-top:1px dashed var(--line-strong);margin:15px 0}
.loading{color:var(--muted);font-size:.85rem;padding:8px 0}

/* ---- model panel ---- */
.modelpanel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);
  padding:20px 22px;margin-bottom:22px;box-shadow:var(--shadow)}
.modelpanel .mp-h{font-weight:700;margin-bottom:6px;font-size:1.04rem;color:var(--ink)}
.modelpanel .mp-note{font-size:.82rem;color:var(--muted);margin-bottom:16px;line-height:1.6}
.modelpanel label>div{font-size:.8rem;color:var(--muted);margin-bottom:5px;font-weight:600}
.modelpanel input,.modelpanel select{width:100%;padding:10px 12px;border:1px solid var(--line-strong);
  border-radius:var(--r-sm);font-size:.95rem;background:var(--bg-sunk);color:var(--ink);box-shadow:none}
.modelpanel input:focus,.modelpanel select:focus{outline:none;border-color:var(--accent);background:#fff}
</style>
</head>
<body>

<!-- token gate -->
<div id="gate" hidden style="max-width:430px">
  <svg class="gate-mark" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="vdGate" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E8714F"/><stop offset="1" stop-color="#C5431F"/></linearGradient></defs><path d="M16 2.5C16 2.5 6 13 6 20.2 6 25.9 10.5 30 16 30s10-4.1 10-9.8C26 13 16 2.5 16 2.5Z" fill="url(#vdGate)"/><circle cx="12.2" cy="20.6" r="3" fill="#fff" opacity="0.34"/></svg>

</div>

<!-- dashboard -->
<div id="app" hidden>
  <nav class="appbar">

        <span class="name">VoiceDrop</span><span class="sub">控制台</span>
      </a>

      </div>

  <div class="wrap">
    <div class="pagehead">
      <h1>概览</h1>
      <span class="tag" id="updated"></span>
      <span class="grow"></span>
      <div class="tools">
        <button class="btn" id="modelBtn">模型设置</button>
      </div>
    </div>

    <!-- ── 模型设置面板 ── -->
    <div id="modelPanel" class="modelpanel" style="display:none">
      <div class="mp-h">挖文模型设置</div>
      <div class="mp-note">API Key 通过 Cloudflare Worker Secrets 管理，此处不需要填写。</div>
      <div style="display:grid;gap:12px;max-width:480px">
        <label>
          <div>供应商</div>

            <option value="qwen">通义千问 (Alibaba)</option>
            <option value="hunyuan">混元 (Tencent)</option>
            <option value="openrouter">OpenRouter</option>
            <option value="volc-ark">火山方舟 (ByteDance) ⚠️ 需填 ep-xxx</option>
          </select>
        </label>

          <div>模型名称</div>

        </label>

          <input id="mBaseUrl" type="text"/>
        </label>

          <button class="btn primary" id="mSave" style="padding:9px 24px">保存</button>

    <div class="cards" id="cards"></div>
    <div id="users"></div>
  </div>
</div>

<script src="/voicedrop/shared.js"></script>
<script>
const API = '/files/api';
const TKEY = 'vd_admin_token';
let TOKEN = localStorage.getItem(TKEY) || '';

// $ / esc / resolveArticles come from /voicedrop/shared.js (single source of truth).
const el = (t, c, h) => { const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; };

// ---- API helpers (admin scope: raw keys) ----
async function apiList(){
  const r = await fetch(`${API}/list`, { headers:{ Authorization:`Bearer ${TOKEN}` }});
  if(r.status===401) throw new Error('unauthorized');
  if(!r.ok) throw new Error('list failed: '+r.status);
  return (await r.json()).files || [];
}
async function apiGetJSON(key){
  const r = await fetch(`${API}/download/${key.split('/').map(encodeURIComponent).join('/')}`,
    { headers:{ Authorization:`Bearer ${TOKEN}` }});
  if(!r.ok) throw new Error('download failed: '+r.status);
  return r.json();
}
async function apiGetText(key){
  const r = await fetch(`${API}/download/${key.split('/').map(encodeURIComponent).join('/')}`,
    { headers:{ Authorization:`Bearer ${TOKEN}` }});
  if(!r.ok) throw new Error('download failed: '+r.status);
  return r.text();
}
function audioURL(key){
  return `${API}/download/${key.split('/').map(encodeURIComponent).join('/')}?token=${encodeURIComponent(TOKEN)}`;
}

// ---- filename parsing ----
// VoiceDrop-<YYYY-MM-DD>-<HHMMSS>-<dur>-<weekday>-<period>[-<city>-<district>]
function parseStem(stem){
  const out = { date:'', time:'', dur:'', weekday:'', period:'', city:'', district:'', durSec:0 };
  const m = stem.match(/^VoiceDrop-(\d{4}-\d{2}-\d{2})-(\d{6})(?:-(\d+m\d+s|\d+s))?(?:-([A-Za-z]+))?(?:-([A-Za-z]+))?(?:-([A-Za-z]+))?(?:-([A-Za-z]+))?/);
  if(!m) return out;
  out.date = m[1];
  out.time = m[2] ? `${m[2].slice(0,2)}:${m[2].slice(2,4)}` : '';
  out.dur = m[3] || '';
  out.weekday = m[4] || '';
  out.period = m[5] || '';
  out.city = m[6] || '';
  out.district = m[7] || '';
  if(out.dur){ const d=out.dur.match(/(?:(\d+)m)?(\d+)s/); if(d) out.durSec=(+(d[1]||0))*60+(+d[2]); }
  return out;
}
function fmtDur(sec){ if(!sec) return '—'; const m=Math.floor(sec/60),s=sec%60; return m?`${m}分${s}秒`:`${s}秒`; }
function fmtTotal(sec){ const h=Math.floor(sec/3600),m=Math.round((sec%3600)/60); return h?`${h}h${m}m`:`${m}分钟`; }
function fmtBytes(b){ if(b<1024)return b+'B'; if(b<1048576)return (b/1024).toFixed(0)+'KB'; return (b/1048576).toFixed(1)+'MB'; }
const PERIOD_ZH={EarlyMorning:'清晨',Morning:'上午',Noon:'中午',Afternoon:'下午',Evening:'傍晚',Night:'夜晚',LateNight:'深夜'};

// ---- aggregate keys -> users ----
function aggregate(files){
  const users = {}; // sub -> {sub, claudemd, recs:{stem->{...}}}
  const U = sub => users[sub] || (users[sub]={ sub, claudemd:null, recs:{} });
  for(const f of files){
    if(!f.name.startsWith('users/')) continue;
    const parts = f.name.split('/');
    const sub = parts[1];
    if(!sub) continue;
    const u = U(sub);
    const rest = parts.slice(2).join('/');
    if(rest==='CLAUDE.md'){ u.claudemd=f; continue; }
    if(parts[2]==='articles'){
      const fn = parts[3]||'';
      const dot = fn.lastIndexOf('.'); const stem=fn.slice(0,dot), ext=fn.slice(dot+1);
      if(!stem) continue;
      const r = u.recs[stem] || (u.recs[stem]={ stem });
      if(ext==='json') r.json=f;
      else if(ext==='empty') r.empty=f;
      else if(ext==='srt') r.srt=f;
      continue;
    }
    if(rest.endsWith('.m4a')){
      const stem = rest.slice(0,-4);
      const r = u.recs[stem] || (u.recs[stem]={ stem });
      r.audio=f;
    }
  }
  return users;
}
function recStatus(r){ return r.json?'ok':r.empty?'warn':'idle'; }
const STATUS_TXT={ok:'已成文',warn:'无语音',idle:'待处理'};

// ---- render ----
async function load(){
  $('#users').innerHTML = '<div class="loading"><span class="spin"></span>读取中…</div>';
  $('#cards').innerHTML='';
  let files;
  try { files = await apiList(); }
  catch(e){
    if(String(e.message).includes('unauthorized')){ logout('token 无效'); return; }
    $('#users').innerHTML = `<div class="empty-state">加载失败：${esc(e.message)}</div>`;
    return;
  }
  const users = aggregate(files);
  const subs = Object.keys(users).sort();

  // stats
  let nAudio=0,nOk=0,nWarn=0,nIdle=0,totalSec=0;
  for(const s of subs) for(const stem in users[s].recs){
    const r=users[s].recs[stem];
    if(r.audio){ nAudio++; totalSec+=parseStem(stem).durSec; }
    const st=recStatus(r);
    if(st==='ok')nOk++; else if(st==='warn')nWarn++; else if(r.audio)nIdle++;
  }
  $('#updated').textContent = '更新于 '+new Date().toLocaleTimeString('zh-CN');
  $('#cards').innerHTML='';
  const cards=[
    ['',subs.length,'用户'],
    ['',nAudio,'音频'],
    ['ok',nOk,'已成文'],
    ['warn',nWarn,'无语音'],
    ['idle',nIdle,'待处理'],
    ['',fmtTotal(totalSec),'总时长'],
  ];
  for(const [c,n,l] of cards){
    $('#cards').append(el('div','card '+c, `<div class="n">${n}</div><div class="l">${l}</div>`));
  }

  // user list (most recent activity first)
  const box=$('#users'); box.innerHTML='';
  if(!subs.length){ box.innerHTML='<div class="empty-state">还没有用户数据。</div>'; return; }
  const withTime = subs.map(s=>{
    const recs=Object.values(users[s].recs);
    let latest=''; for(const r of recs){ const f=r.audio||r.json||r.empty; if(f&&f.uploaded>latest)latest=f.uploaded; }
    return {s,latest};
  }).sort((a,b)=> b.latest<a.latest?-1:1);

  for(const {s} of withTime) box.append(renderUser(users[s]));
}

function renderUser(u){
  const recs = Object.values(u.recs);
  const nAudio = recs.filter(r=>r.audio).length;
  const nOk = recs.filter(r=>r.json).length;
  const nWarn = recs.filter(r=>!r.json&&r.empty).length;

  const d = el('details','user');
  const sum = el('summary');
  sum.innerHTML = `<span class="caret">▶</span>
    <span class="uava" data-ava>${esc(avaInit(u.sub))}</span>
    <span><span class="uname" data-name>${esc(shortSub(u.sub))}</span>
    <span class="usub"> ${esc(u.sub)}</span></span>
    <span class="ustat">
      <span class="pill au">${nAudio} 音频</span>
      ${nOk?`<span class="pill ok">${nOk} 成文</span>`:''}
      ${nWarn?`<span class="pill warn">${nWarn} 无语音</span>`:''}
    </span>`;
  d.append(sum);

  const body = el('div','ubody');
  d.append(body);

  // load name + style from CLAUDE.md once, lazily on first open
  let opened=false;
  d.addEventListener('toggle', async ()=>{
    if(!d.open || opened) return; opened=true;
    if(u.claudemd){
      try{
        const md = await apiGetText(u.claudemd.name);
        const {name,style} = parseClaudeMd(md);
        if(name){ const nm=sum.querySelector('[data-name]'); if(nm) nm.textContent=name;
          const av=sum.querySelector('[data-ava]'); if(av) av.textContent=avaInit(name); }
        if(style) body.prepend(el('div','style', `<b>文风设置</b>${esc(style)}`));
      }catch(_){}
    }
    // sort recordings newest first
    recs.sort((a,b)=>{ const fa=(a.audio||a.json||a.empty||{}).uploaded||'', fb=(b.audio||b.json||b.empty||{}).uploaded||''; return fb<fa?-1:1; });
    for(const r of recs) body.append(renderRec(r));
  });
  return d;
}

function parseClaudeMd(md){
  const lines=md.split('\n'); let name='',style='',inName=false,inStyle=false;
  for(const l of lines){
    if(/^#\s*我的名字/.test(l)){inName=true;inStyle=false;continue;}
    if(/^#\s*我的文风/.test(l)){inStyle=true;inName=false;continue;}
    if(l.startsWith('#')){inName=false;inStyle=false;continue;}
    if(inName&&!name&&l.trim()) name=l.trim();
    if(inStyle) style+=l+'\n';
  }
  return {name:name.trim(),style:style.trim()};
}
function shortSub(sub){ return sub.replace(/^anon-/,'匿名 ').slice(0,12); }
function avaInit(s){ const t=String(s||'').replace(/^anon-/,'').replace(/^users\//,''); return (t[0]||'?').toUpperCase(); }

function renderRec(r){
  const p = parseStem(r.stem);
  const st = recStatus(r);
  const wrap = el('div','rec');
  const loc = [p.city,p.district].filter(Boolean).join('·');
  const meta = [
    p.date+(p.time?(' '+p.time):''),
    p.dur?fmtDur(p.durSec):'',
    PERIOD_ZH[p.period]||p.period,
    loc,
    r.audio?fmtBytes(r.audio.size):'',
  ].filter(Boolean).map(esc).join('<span class="dot">·</span>');

  wrap.innerHTML = `<div class="rhead">
    <span class="badge ${st}">${STATUS_TXT[st]}</span>
    <span class="rtitle" data-title>${esc(loc||p.date||r.stem)}</span>
  </div>
  <div class="rmeta">${meta||esc(r.stem)}</div>`;

  if(r.audio){
    const au=el('audio'); au.controls=true; au.preload='none'; au.src=audioURL(r.audio.name);
    wrap.append(au);
  }

  const acts=el('div','acts');
  const detail=el('div','detail');
  const canDetail = r.json||r.empty;
  if(canDetail){
    const btn=el('button','lnk', st==='ok'?'查看文章 / 转写':'查看处理结果');
    let loaded=false;
    btn.onclick=async ()=>{
      detail.classList.toggle('open');
      if(loaded) return; loaded=true;
      detail.innerHTML='<div class="loading"><span class="spin"></span>读取中…</div>';
      try{ await fillDetail(detail, r, wrap); }
      catch(e){ detail.innerHTML=`<div class="reason">读取失败：${esc(e.message)}</div>`; }
    };
    acts.append(btn);
  } else if(r.audio){
    acts.append(el('span','rmeta','尚未处理（等下一轮 mine）'));
  }
  if(r.srt){
    const sb=el('button','lnk','字幕 SRT');
    sb.onclick=async ()=>{
      if(sb.dataset.done){ sb.nextElementSibling?.remove(); delete sb.dataset.done; return; }
      try{ const t=await apiGetText(r.srt.name); const pre=el('div','tx',esc(t)); pre.style.marginTop='8px'; sb.after(pre); sb.dataset.done='1'; }
      catch(_){}
    };
    acts.append(sb);
  }
  if(acts.children.length) wrap.append(acts);
  wrap.append(detail);
  return wrap;
}

async function fillDetail(detail, r, wrap){
  if(r.json){
    const doc = await apiGetJSON(r.json.name);
    const arts = resolveArticles(doc);
    let h='';
    h += `<div class="kv">${esc(doc.model||'')}${doc.createdAt?(' · '+esc(new Date(doc.createdAt).toLocaleString('zh-CN'))):''}${doc.status?(' · '+esc(doc.status)):''}</div>`;
    if(arts.length){
      h+='<h4>挖出的文章（'+arts.length+'）</h4>';
      for(const a of arts) h+=`<div class="art"><div class="at">${esc(a.title||'无题')}</div><div class="ab">${esc((a.body||'').trim())}</div></div>`;
    } else {
      h+='<div class="reason">这条没有挖出文章。</div>';
    }
    if(doc.transcript){ h+='<hr/><h4>转写原文</h4><div class="tx">'+esc(doc.transcript.trim())+'</div>'; }
    detail.innerHTML=h;
    // promote first article title to the row title
    if(arts.length){ const t=wrap.querySelector('[data-title]'); if(t&&arts[0].title) t.textContent=arts[0].title; }
  } else if(r.empty){
    const doc = await apiGetJSON(r.empty.name);
    const why={corrupt:'文件损坏',silent:'太短/静音','no-speech':'没有识别到语音'}[doc.reason]||doc.reason||'无语音';
    detail.innerHTML=`<div class="reason">无语音 · ${esc(why)}</div>`+
      (doc.detail?`<div class="kv" style="margin-top:6px">${esc(doc.detail)}</div>`:'');
  }
}

// ---- gate / boot ----
function showGate(msg){ $('#app').hidden=true; $('#gate').hidden=false; $('#gateErr').textContent=msg||''; $('#tok').focus(); }
function logout(msg){ TOKEN=''; localStorage.removeItem(TKEY); showGate(msg); }
function enter(){
  const v=$('#tok').value.trim();
  if(!v){ $('#gateErr').textContent='请输入 token'; return; }
  TOKEN=v; localStorage.setItem(TKEY,v);
  $('#gate').hidden=true; $('#app').hidden=false; load(); loadModelCfg();
}
$('#enter').onclick=enter;
$('#tok').addEventListener('keydown',e=>{ if(e.key==='Enter')enter(); });
$('#refresh').onclick=load;
$('#logout').onclick=()=>logout();

if(TOKEN){ $('#app').hidden=false; load(); loadModelCfg(); } else { showGate(); }

// ── 模型设置 ──────────────────────────────────────────────────────────────────
const PROVIDERS = {
  'anthropic':  { baseUrl: '',                                                    defaultModel: 'claude-sonnet-4-6' },
  'openai':     { baseUrl: 'https://api.openai.com/v1',                          defaultModel: 'gpt-4o' },
  'deepseek':   { baseUrl: 'https://api.deepseek.com/v1',                        defaultModel: 'deepseek-chat' },
  'moonshot':   { baseUrl: 'https://api.moonshot.cn/v1',                         defaultModel: 'moonshot-v1-32k' },
  'qwen':       { baseUrl: 'https://dashscope.aliyuncs.com/compatible-mode/v1', defaultModel: 'qwen-max' },
  'hunyuan':    { baseUrl: 'https://api.hunyuan.cloud.tencent.com/v1',           defaultModel: 'hunyuan-turbo' },
  'openrouter': { baseUrl: 'https://openrouter.ai/api/v1',                       defaultModel: 'deepseek/deepseek-chat' },
  'volc-ark':   { baseUrl: 'https://ark.cn-beijing.volces.com/api/v3',           defaultModel: 'ep-xxxxxxxxxx' },
};

$('#modelBtn').onclick = () => {
  const p = $('#modelPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
};
$('#mProvider').onchange = () => {
  const key = $('#mProvider').value;
  const p = PROVIDERS[key] || {};
  const isAnthro = key === 'anthropic';
  $('#mBaseUrlRow').style.display = isAnthro ? 'none' : 'block';
  if (p.baseUrl !== undefined) $('#mBaseUrl').value = p.baseUrl;
  // auto-fill model only if currently empty or is a known default
  const cur = $('#mModel').value.trim();
  const knownDefaults = Object.values(PROVIDERS).map(v => v.defaultModel);
  if (!cur || knownDefaults.includes(cur)) $('#mModel').value = p.defaultModel || '';
};
async function loadModelCfg() {
  try {
    const r = await fetch(`${API}/download/config/model.json`, { headers:{ Authorization:`Bearer ${TOKEN}` }});
    if (!r.ok) return;
    const cfg = await r.json();
    const key = cfg.providerKey || cfg.provider || 'anthropic';
    if ($(`#mProvider option[value="${key}"]`)) $('#mProvider').value = key;
    if (cfg.model)   $('#mModel').value   = cfg.model;
    if (cfg.baseUrl) $('#mBaseUrl').value = cfg.baseUrl;
    const isAnthro = key === 'anthropic';
    $('#mBaseUrlRow').style.display = isAnthro ? 'none' : 'block';
  } catch(_) {}
}
$('#mSave').onclick = async () => {
  const providerKey = $('#mProvider').value;
  const cfg = {
    providerKey,
    model:   $('#mModel').value.trim(),
    baseUrl: $('#mBaseUrl').value.trim(),
  };
  if (!cfg.model) { showMsg('请填写模型名称', 'var(--warn)'); return; }
  if (providerKey !== 'anthropic' && !cfg.baseUrl) { showMsg('请填写 Base URL', 'var(--warn)'); return; }
  try {
    $('#mSave').disabled = true;
    const r = await fetch(`${API}/upload/config/model.json`, {
      method: 'PUT',
      headers: { Authorization:`Bearer ${TOKEN}`, 'Content-Type':'application/json' },
      body: JSON.stringify(cfg),
    });
    if (!r.ok) throw new Error(`${r.status}`);
    showMsg('已保存 ✓', 'var(--ok)');
  } catch(e) { showMsg('保存失败：'+e.message, 'var(--err)'); }
  finally { $('#mSave').disabled = false; }
};
function showMsg(txt, color) {
  const m = $('#mMsg'); m.textContent = txt; m.style.color = color;
  setTimeout(() => { m.textContent = ''; }, 3000);
}
</script>
</body>
