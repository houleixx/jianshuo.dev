<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>VoiceDrop · 举报审核</title>
<link rel="stylesheet" href="./theme.css"/>
<script>
/* Standalone/preview fallback for the three helpers the pages use. The production
   server's /voicedrop/shared.js loads later and overrides these — safe either way. */
window.$=window.$||function(s,r){return (r||document).querySelector(s);};
window.esc=window.esc||function(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');};
window.resolveArticles=window.resolveArticles||function(doc){if(!doc)return[];var a=doc.articles||(doc.result&&doc.result.articles)||(doc.output&&doc.output.articles)||doc.results||[];if(!Array.isArray(a))return[];return a.map(function(x){return typeof x==='string'?{title:'',body:x}:{title:x.title||x.heading||'',body:x.body||x.content||x.text||''};});};
</script>
<style>
.wrap{max-width:780px;margin:0 auto;padding:26px 22px 90px}
.rep{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);padding:18px 20px;
  margin-bottom:14px;box-shadow:var(--shadow)}
.rep .rtitle{font-weight:700;font-size:1.06rem;color:var(--ink);margin:0 0 3px}
.rep .rmeta{font-size:.78rem;color:var(--muted);margin-bottom:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rep .rbody{white-space:pre-wrap;font-size:.9rem;line-height:1.75;color:var(--ink-2);
  background:var(--bg-sunk);border:1px solid var(--line2);border-radius:var(--r-sm);padding:12px 14px;max-height:210px;overflow:auto}
.rep .gone{color:var(--warn);font-size:.88rem;background:var(--warn-bg);border-radius:var(--r-sm);padding:10px 13px}
.rep .acts{display:flex;gap:10px;margin-top:14px}
</style>
</head>
<body>

<div id="gate" hidden style="max-width:430px">
  <svg class="gate-mark" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="vdGate" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E8714F"/><stop offset="1" stop-color="#C5431F"/></linearGradient></defs><path d="M16 2.5C16 2.5 6 13 6 20.2 6 25.9 10.5 30 16 30s10-4.1 10-9.8C26 13 16 2.5 16 2.5Z" fill="url(#vdGate)"/><circle cx="12.2" cy="20.6" r="3" fill="#fff" opacity="0.34"/></svg>
  <h1>举报审核</h1>
  <p>粘贴白名单内的 session token 审核被举报的社区内容。token 只存在本机浏览器，不上传。</p>
  <input id="tok" type="password" placeholder="你的 session token" autocomplete="off" spellcheck="false"/>
  <div class="err" id="gateErr"></div>
  <button class="btn primary block" id="enter">进入</button>
</div>

<div id="app" hidden>
  <nav class="appbar">
    <div class="appbar-in">
      <a class="brand" href="./">
        <svg class="mark" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="vdNav" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E8714F"/><stop offset="1" stop-color="#C5431F"/></linearGradient></defs><path d="M16 2.5C16 2.5 6 13 6 20.2 6 25.9 10.5 30 16 30s10-4.1 10-9.8C26 13 16 2.5 16 2.5Z" fill="url(#vdNav)"/><circle cx="12.2" cy="20.6" r="3" fill="#fff" opacity="0.34"/></svg>
        <span class="name">VoiceDrop</span><span class="sub">控制台</span>
      </a>
      <div class="nav-tabs">
        <a class="nav-tab" href="./">概览</a>
        <a class="nav-tab active" href="./reports.html">举报审核</a>
        <a class="nav-tab" href="./usage.html">算力账本</a>
        <a class="nav-tab" href="./feed.html">投喂账本</a>
        <a class="nav-tab" href="./mine.html">挖文日志</a>
        <a class="nav-tab" href="./llm.html">LLM 日志</a>
        <a class="nav-tab" href="./refhits.html">访客 IP</a>
      </div>
      <div class="nav-actions">
        <button class="btn ghost" id="refresh">刷新</button>
        <button class="btn ghost" id="logout">退出</button>
      </div>
    </div>
  </nav>

  <div class="wrap">
    <div class="pagehead">
      <h1>举报审核</h1>
      <span class="tag" id="updated"></span>
    </div>
    <p class="subtle">被举报的内容已<b>自动从社区下架</b>，在这里等你处理。删除 = 永久移除；恢复 = 重新上架（举报无效）。建议 24 小时内处理。</p>
    <div id="list"></div>
  </div>
</div>

<script src="/voicedrop/shared.js"></script>
<script>
const API = '/files/api';
const TKEY = 'vd_admin_sess';   // 存用户 session token（换 FILES_TOKEN 用）
let TOKEN = '';   // 换回来的 admin FILES_TOKEN，仅内存
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};

async function load(){
  $('#list').innerHTML = '<div class="empty-state"><span class="spin"></span> 读取中…</div>';
  let reports;
  try {
    const r = await fetch(`${API}/community/reports`, { headers:{ Authorization:`Bearer ${TOKEN}` }});
    if(r.status===401||r.status===403){ logout('token 无效'); return; }
    if(!r.ok) throw new Error('加载失败 '+r.status);
    reports = (await r.json()).reports || [];
  } catch(e){ $('#list').innerHTML=`<div class="empty-state">${esc(e.message)}</div>`; return; }

  $('#updated').textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN');
  if(!reports.length){ $('#list').innerHTML='<div class="empty-state">没有待处理的举报 🎉</div>'; return; }

  const box = $('#list'); box.innerHTML='';
  for(const rp of reports){
    const card = el('div','rep');
    const when = rp.firstAt ? new Date(rp.firstAt).toLocaleString('zh-CN') : '';
    card.innerHTML = `
      <div class="rtitle">${esc(rp.title || (rp.gone ? '（原文已删除）' : '无题'))}</div>
      <div class="rmeta">作者 ${esc(rp.author||'匿名')} <span class="pill rep">${rp.reports} 次举报</span> ${esc(when)}</div>
      ${rp.gone ? '<div class="gone">原帖/原文已不存在，可直接清除此举报记录。</div>'
                : `<div class="rbody">${esc(rp.body||'（无正文）')}</div>`}
      <div class="acts">
        <button class="btn danger" data-act="remove">删除（永久移除）</button>
        <button class="btn" data-act="restore">恢复上架</button>
      </div>`;
    card.querySelector('[data-act="remove"]').onclick = ()=>resolve(rp.shareId, 'remove', card);
    card.querySelector('[data-act="restore"]').onclick = ()=>resolve(rp.shareId, 'restore', card);
    box.append(card);
  }
}

async function resolve(shareId, action, card){
  if(action==='remove' && !confirm('永久删除这条社区内容？不可恢复。')) return;
  card.style.opacity = .5;
  try {
    const r = await fetch(`${API}/community/resolve/${encodeURIComponent(shareId)}`, {
      method:'POST', headers:{ Authorization:`Bearer ${TOKEN}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ action }),
    });
    if(!r.ok) throw new Error(''+r.status);
    card.remove();
    if(!$('#list').children.length) $('#list').innerHTML='<div class="empty-state">没有待处理的举报 🎉</div>';
  } catch(e){ card.style.opacity=1; alert('操作失败：'+e.message); }
}

function showGate(msg){ $('#app').hidden=true; $('#gate').hidden=false; $('#gateErr').textContent=msg||''; $('#tok').focus(); }
function logout(msg){ TOKEN=''; localStorage.removeItem(TKEY); showGate(msg); }
async function enter(){
  const v=$('#tok').value.trim();
  if(!v){ $('#gateErr').textContent='请粘贴你的 session token'; return; }
  $('#gateErr').textContent='校验中…';
  let ft; try{ ft=await vdAdminExchange(v); }
  catch(e){ $('#gateErr').textContent=e.message; return; }
  TOKEN=ft; localStorage.setItem(TKEY,v); $('#gate').hidden=true; $('#app').hidden=false; load();
}
$('#enter').onclick=enter;
$('#tok').addEventListener('keydown',e=>{ if(e.key==='Enter')enter(); });
$('#refresh').onclick=load;
$('#logout').onclick=()=>logout();

(async()=>{
  const sess=localStorage.getItem(TKEY)||'';
  if(!sess){ showGate(); return; }
  try{ TOKEN=await vdAdminExchange(sess); }
  catch(e){ localStorage.removeItem(TKEY); showGate(e.message||''); return; }
  $('#app').hidden=false; load();
})();
</script>
</body>
</html>
