# voicedrop 相关文件推到 main 时自动部署 Cloudflare Pages。
# 主要服务云端夜间英文同步 routine（它只会 push，不部署）。
# 需要仓库 secrets：CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID。
# 其余目录仍维持手动 wrangler 部署的老习惯，不受此工作流影响。
name: deploy-pages
on:
  push:
    branches: [main]
    paths:
      - 'voicedrop/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 pages deploy . --project-name jianshuo-dev --branch main --commit-dirty=true
